id: com.github.ryonakano.pinit.Devel
runtime: io.elementary.Platform
runtime-version: '8.1'
sdk: io.elementary.Sdk
command: com.github.ryonakano.pinit.Devel
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
  # For drawing icons
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/vala
modules:
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/blueprint-compiler.git
        tag: v0.20.4
        commit: 31b62c24a72c1670d2d93dcdf2d130f1ae12778e
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: pinit
    buildsystem: meson
    config-opts:
      - -Ddevelopment=true
      - -Dgranite=enabled
    sources:
      - type: dir
        path: ../../
